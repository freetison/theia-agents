services:
  postgres:
    image: postgres:16-alpine
    container_name: theia_postgres
    environment:
      POSTGRES_DB: theia_dev
      POSTGRES_USER: theia
      POSTGRES_PASSWORD: theia_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - theia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theia -d theia_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  theia_pgdata:
