<div :class="['agent-card', statusClass]">
  <div class="agent-card__header">
    <span class="agent-card__icon" :title="status">{{ statusIcon }}</span>
    <span class="agent-card__name">{{ displayName }}</span>
    <span v-if="confidence != null && confidence >= 0.6" class="agent-card__confidence" title="Agent confidence">{{ (confidence * 100).toFixed(0) }}%</span>
  </div>
  <p v-if="shortSummary" class="agent-card__summary">{{ shortSummary }}</p>
  <p v-if="errorMessage" class="agent-card__error">{{ errorMessage }}</p>
  <button v-if="status === 'error'" class="agent-card__retry" data-testid="retry-btn" @click="handleRetry">Retry</button>
</div>
