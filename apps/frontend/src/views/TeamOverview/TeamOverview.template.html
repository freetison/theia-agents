<div class="team-overview">
  <h1 class="team-overview__title">Theia Agents — Team Overview</h1>

  <div class="team-overview__form">
    <div v-if="profilesError" class="team-overview__error">{{ profilesError }}</div>

    <div class="team-overview__profile-row">
      <label for="profile-select" class="team-overview__label">Profile</label>
      <select
        id="profile-select"
        v-model="selectedProfileId"
        class="team-overview__select"
        :disabled="profiles.length === 0 || isRunning"
      >
        <option v-if="profiles.length === 0" value="">Loading profiles…</option>
        <option
          v-for="p in profiles"
          :key="p.id"
          :value="p.id"
        >{{ p.name }} ({{ p.slug }})</option>
      </select>
    </div>

    <textarea
      id="problem-input"
      class="team-overview__textarea"
      placeholder="Describe the business problem or opportunity…"
      rows="4"
    />
    <button
      class="team-overview__run-btn"
      :disabled="isRunning || !selectedProfileId"
      @click="handleRunAll"
    >
      {{ isRunning ? 'Running…' : 'Run' }}
    </button>
  </div>

  <p v-if="sessionId" class="team-overview__session">Session: {{ sessionId }}</p>

  <div class="team-overview__grid">
    <AgentCard
      v-for="agent in agentStatuses"
      :key="agent.name"
      :agent-name="agent.name"
      :status="agent.status"
      :confidence="agent.confidence"
      :summary="agent.summary"
      :error-message="agent.errorMessage"
    />
  </div>
</div>
